steps:
  # =========================================================================
  # VoteVault Web Application
  # =========================================================================

  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-app'
    args:
      - 'build'
      - '-t'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/veda-file-intake/app:$COMMIT_SHA'
      - '-t'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/veda-file-intake/app:latest'
      - '.'

  # Push the tagged image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-app'
    args:
      - 'push'
      - '--all-tags'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/veda-file-intake/app'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-app'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'votevault'
      - '--image'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/veda-file-intake/app:$COMMIT_SHA'
      - '--region'
      - 'us-east1'
      - '--set-env-vars'
      - 'GCLOUD_PROJECT=$PROJECT_ID,GCS_BUCKET_NAME=$_GCS_BUCKET_NAME'

  # =========================================================================
  # ClamAV Malware Scanner Service
  # =========================================================================

  # Build the malware scanner image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-scanner'
    args:
      - 'build'
      - '-t'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/veda-file-intake/malware-scanner:$COMMIT_SHA'
      - '-t'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/veda-file-intake/malware-scanner:latest'
      - 'infra/malware-scanner'

  # Push the scanner image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-scanner'
    args:
      - 'push'
      - '--all-tags'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/veda-file-intake/malware-scanner'

  # Deploy malware scanner to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-scanner'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'veda-malware-scanner'
      - '--image'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/veda-file-intake/malware-scanner:$COMMIT_SHA'
      - '--region'
      - 'us-east1'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '300'
      - '--max-instances'
      - '3'
      - '--no-allow-unauthenticated'
      - '--cpu-boost'
      - '--set-env-vars'
      - 'GCLOUD_PROJECT=$PROJECT_ID,UNSCANNED_BUCKET=nysboe-veda-interim-uploads,CLEAN_BUCKET=nysboe_veda_clean,QUARANTINE_BUCKET=nysboe_veda_quarantine'

  # Ensure Eventarc trigger routes ONLY unscanned-bucket events to the scanner.
  # This is idempotent — if the trigger already exists with the correct config,
  # the update is a no-op.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'setup-scanner-trigger'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ -z "$_SCANNER_SA_EMAIL" ]; then
          echo "ERROR: _SCANNER_SA_EMAIL substitution variable is not set."
          echo "Configure it in Cloud Build trigger settings with the scanner service account email."
          exit 1
        fi

        # Delete any existing trigger so we can recreate with exact filters
        gcloud eventarc triggers delete veda-malware-scan-trigger \
          --location=us-east1 --quiet 2>/dev/null || true

        gcloud eventarc triggers create veda-malware-scan-trigger \
          --location=us-east1 \
          --destination-run-service=veda-malware-scanner \
          --destination-run-region=us-east1 \
          --event-filters="type=google.cloud.storage.object.v1.finalized" \
          --event-filters="bucket=nysboe-veda-interim-uploads" \
          --service-account="$_SCANNER_SA_EMAIL"

images:
  - 'us-east1-docker.pkg.dev/$PROJECT_ID/veda-file-intake/app:$COMMIT_SHA'
  - 'us-east1-docker.pkg.dev/$PROJECT_ID/veda-file-intake/app:latest'
  - 'us-east1-docker.pkg.dev/$PROJECT_ID/veda-file-intake/malware-scanner:$COMMIT_SHA'
  - 'us-east1-docker.pkg.dev/$PROJECT_ID/veda-file-intake/malware-scanner:latest'

substitutions:
  _GCS_BUCKET_NAME: ''  # Set per Cloud Build trigger (UAT vs Production)
  _SCANNER_SA_EMAIL: ''  # Scanner service account email (e.g., veda-malware-scanner@PROJECT.iam.gserviceaccount.com)

options:
  logging: CLOUD_LOGGING_ONLY
